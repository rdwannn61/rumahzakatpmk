<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Yang TTD</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background-color:#e9edf2;
        margin:0;
        padding:20px;
    }

    .card{
        background:#ffffff;
        border-radius:8px;
        box-shadow:0 2px 6px rgba(0,0,0,0.15);
        max-width:500px;
        margin:auto;
        overflow:hidden;
    }

    .section{
        padding:20px;
        border-bottom:1px solid #eee;
    }

    .section:last-child{
        border-bottom:none;
    }

    .title{
        font-size:18px;
        font-weight:bold;
        margin-bottom:10px;
        color:#333;
    }

    .label{
        font-weight:bold;
        margin-top:10px;
        color:#555;
    }

    .value{
        margin-top:5px;
        color:#444;
        font-size:16px;
    }
</style>
</head>

<body>

<div class="card">

    <div class="section">
        <div class="title">Data Yang TTD</div>
        <div class="value">-</div>
    </div>

    <div class="section">
        <div class="label">NIP</div>
        <div class="value">1102004001093</div>
    </div>

    <div class="section">
        <div class="label">Nama</div>
        <div class="value">Muslih Wahid</div>
    </div>
    
    <div class="section">
        <div class="label">Jabatan</div>
        <div class="value">Koordinator Rumah Zakat Wilayah Jawa Timur 1</div>
    </div>

</div>

</body>
</html>
